<?xml version="1.0" encoding="UTF-8"?>
<!-- CCMeter App Icon — B·10 "Account Card + Meter"
     - macOS squircle (1024×1024) 안전 영역 안에 ID 카드 배치
     - 다크 배경 + 라이트 카드 + Claude orange 아바타 + 정상 그린 미터 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 배경 그라데이션 (Claude orange 톤 다크 → 블랙) -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a1f15"/>
      <stop offset="0.55" stop-color="#1a0f0a"/>
      <stop offset="1" stop-color="#0d0907"/>
    </linearGradient>
    <!-- 카드 라이트 그라데이션 -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fafaf7"/>
      <stop offset="1" stop-color="#ebe9e3"/>
    </linearGradient>
    <!-- 아바타 그라데이션 -->
    <linearGradient id="avaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e88a6a"/>
      <stop offset="1" stop-color="#c45838"/>
    </linearGradient>
    <!-- 미터 그라데이션 -->
    <linearGradient id="meterGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <!-- 카드 그림자 -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="24" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- macOS squircle 배경 (1024 마스크는 시스템이 적용하지만, 시각적 안전 영역 위해 둥근 사각형) -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>

  <!-- 미세한 격자 노이즈 라인 (선택적) -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
  </g>

  <!-- 카드 본체 (살짝 기울인 인상은 빼고 안정감 유지) -->
  <g filter="url(#cardShadow)">
    <rect x="152" y="248" width="720" height="528" rx="72" ry="72" fill="url(#cardGrad)"/>
    <!-- 카드 상단 미세 하이라이트 -->
    <rect x="152" y="248" width="720" height="60" rx="72" ry="72" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- 아바타 (Claude orange) -->
  <circle cx="320" cy="436" r="92" fill="url(#avaGrad)"/>
  <!-- 아바타 내부 살짝 하이라이트 -->
  <ellipse cx="296" cy="408" rx="34" ry="22" fill="#ffffff" opacity="0.25"/>

  <!-- 이름/계정 라인 (실제 텍스트 대신 추상화한 라인) -->
  <rect x="448" y="396" width="320" height="32" rx="16" fill="#2a2622"/>
  <rect x="448" y="450" width="220" height="20" rx="10" fill="#9a958d"/>

  <!-- 미터 트랙 -->
  <rect x="232" y="608" width="560" height="44" rx="22" fill="#d8d4cc"/>
  <!-- 미터 채움 (약 65%) -->
  <rect x="232" y="608" width="364" height="44" rx="22" fill="url(#meterGrad)"/>
  <!-- 미터 위 작은 단위 표식 (퍼센트 인상) -->
  <circle cx="596" cy="630" r="10" fill="#16a34a"/>

  <!-- 카드 하단 작은 라벨 점 3개 (멀티 계정 암시) -->
  <g>
    <circle cx="232" cy="704" r="11" fill="#c45838"/>
    <circle cx="266" cy="704" r="11" fill="#d8d4cc"/>
    <circle cx="300" cy="704" r="11" fill="#d8d4cc"/>
  </g>

  <!-- 카드 우측 하단 미니 CC 모노그램 -->
  <g transform="translate(720 690)" opacity="0.55">
    <path d="M0 22 A22 22 0 1 0 0 -22" stroke="#6b6660" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M36 22 A22 22 0 1 0 36 -22" stroke="#6b6660" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
